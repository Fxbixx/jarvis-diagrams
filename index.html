<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jarvis Workflow</title>
  <style>html,body,#app{height:100%;margin:0}body{font-family:Inter,Arial,sans-serif}</style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import React from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Excalidraw } from 'https://esm.sh/@excalidraw/excalidraw@0.18.0?external=react,react-dom';
    const initialData = await fetch('./jarvis-workflow.excalidraw').then(r => r.json());
    createRoot(document.getElementById('app')).render(
      React.createElement(Excalidraw, {
        initialData,
        viewModeEnabled: true,
        UIOptions: { canvasActions: { export: true, saveToActiveFile: false, loadScene: false } }
      })
    );
  </script>
</body>
</html>
