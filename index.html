<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jarvis Workflow Diagram</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 8px 30px rgba(15,23,42,.06); overflow: hidden; }
    .top { padding: 18px 22px; border-bottom: 1px solid #e2e8f0; display:flex; justify-content:space-between; gap:16px; align-items:center; }
    .links a { color: #2563eb; text-decoration: none; margin-left: 12px; }
    svg { width: 100%; height: auto; display: block; background: white; }
    .muted { color:#475569; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <h1 style="margin:0;font-size:28px;">Jarvis – Workflow, Tools & Aufgaben</h1>
          <div class="muted">Statische, browser-sichere Ansicht</div>
        </div>
        <div class="links">
          <a href="./jarvis-workflow.excalidraw">Raw Excalidraw-Datei</a>
          <a href="https://github.com/Fxbixx/jarvis-diagrams">GitHub Repo</a>
        </div>
      </div>
      <svg viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Jarvis Workflow Diagram">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L10,3 L0,6 z" fill="#334155" />
          </marker>
        </defs>

        <rect x="60" y="100" rx="22" ry="22" width="250" height="110" fill="#dcfce7" stroke="#1e293b" stroke-width="2"/>
        <text x="185" y="145" text-anchor="middle" font-size="26" fill="#0f172a" font-family="Arial">1. Input</text>
        <text x="185" y="178" text-anchor="middle" font-size="20" fill="#0f172a" font-family="Arial">Telegram / Web / Audio</text>

        <polygon points="505,100 630,155 505,210 380,155" fill="#fef3c7" stroke="#1e293b" stroke-width="2"/>
        <text x="505" y="147" text-anchor="middle" font-size="24" fill="#0f172a" font-family="Arial">2. Verstehen</text>
        <text x="505" y="178" text-anchor="middle" font-size="24" fill="#0f172a" font-family="Arial">&amp; Planen</text>

        <rect x="700" y="100" rx="22" ry="22" width="300" height="110" fill="#dbeafe" stroke="#1e293b" stroke-width="2"/>
        <text x="850" y="145" text-anchor="middle" font-size="26" fill="#0f172a" font-family="Arial">3. Tools einsetzen</text>
        <text x="850" y="178" text-anchor="middle" font-size="20" fill="#0f172a" font-family="Arial">Dateien · Web · APIs · Code</text>

        <line x1="310" y1="155" x2="370" y2="155" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
        <line x1="635" y1="155" x2="690" y2="155" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
        <line x1="505" y1="215" x2="505" y2="275" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

        <rect x="70" y="290" rx="22" ry="22" width="280" height="235" fill="#ffedd5" stroke="#1e293b" stroke-width="2"/>
        <text x="210" y="330" text-anchor="middle" font-size="28" fill="#0f172a" font-family="Arial">Aufgaben</text>
        <text x="100" y="375" font-size="22" fill="#0f172a" font-family="Arial">• Recherchieren</text>
        <text x="100" y="410" font-size="22" fill="#0f172a" font-family="Arial">• Automatisieren</text>
        <text x="100" y="445" font-size="22" fill="#0f172a" font-family="Arial">• Coden</text>
        <text x="100" y="480" font-size="22" fill="#0f172a" font-family="Arial">• Dokumentieren</text>
        <text x="100" y="515" font-size="22" fill="#0f172a" font-family="Arial">• Probleme lösen</text>

        <rect x="390" y="290" rx="22" ry="22" width="290" height="235" fill="#ede9fe" stroke="#1e293b" stroke-width="2"/>
        <text x="535" y="330" text-anchor="middle" font-size="28" fill="#0f172a" font-family="Arial">Arbeitsweise</text>
        <text x="420" y="375" font-size="22" fill="#0f172a" font-family="Arial">• Kontext lesen</text>
        <text x="420" y="410" font-size="22" fill="#0f172a" font-family="Arial">• Memory nutzen</text>
        <text x="420" y="445" font-size="22" fill="#0f172a" font-family="Arial">• Zustand prüfen</text>
        <text x="420" y="480" font-size="22" fill="#0f172a" font-family="Arial">• Tools wählen</text>
        <text x="420" y="515" font-size="22" fill="#0f172a" font-family="Arial">• Ergebnis verifizieren</text>

        <rect x="720" y="290" rx="22" ry="22" width="320" height="235" fill="#fee2e2" stroke="#1e293b" stroke-width="2"/>
        <text x="880" y="330" text-anchor="middle" font-size="28" fill="#0f172a" font-family="Arial">Tools</text>
        <text x="750" y="375" font-size="22" fill="#0f172a" font-family="Arial">• GitHub</text>
        <text x="750" y="410" font-size="22" fill="#0f172a" font-family="Arial">• Notion</text>
        <text x="750" y="445" font-size="22" fill="#0f172a" font-family="Arial">• Excalidraw</text>
        <text x="750" y="480" font-size="22" fill="#0f172a" font-family="Arial">• Tavily / Web Search</text>
        <text x="750" y="515" font-size="22" fill="#0f172a" font-family="Arial">• Whisper / Shell / Dateien</text>

        <line x1="350" y1="405" x2="380" y2="405" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
        <line x1="680" y1="405" x2="710" y2="405" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

        <rect x="420" y="585" rx="22" ry="22" width="270" height="105" fill="#fce7f3" stroke="#1e293b" stroke-width="2"/>
        <text x="555" y="625" text-anchor="middle" font-size="28" fill="#0f172a" font-family="Arial">Output</text>
        <text x="555" y="660" text-anchor="middle" font-size="22" fill="#0f172a" font-family="Arial">Antworten · Dateien · Ergebnisse</text>
        <line x1="535" y1="525" x2="535" y2="575" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
      </svg>
    </div>
  </div>
</body>
</html>
